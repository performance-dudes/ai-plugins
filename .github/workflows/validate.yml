name: validate plugins

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Static checks (no Claude CLI required)
        run: |
          set -e
          echo "== marketplace.json parses =="
          python3 -m json.tool .claude-plugin/marketplace.json >/dev/null && echo "  ok marketplace.json"

          echo "== every plugin.json parses =="
          for f in plugins/*/.claude-plugin/plugin.json; do
            python3 -m json.tool "$f" >/dev/null && echo "  ok $f"
          done

          echo "== marketplace sources resolve =="
          python3 - <<'PY'
          import json, pathlib, sys
          mk = json.load(open('.claude-plugin/marketplace.json'))
          bad = 0
          for p in mk['plugins']:
              src = pathlib.Path(p['source'])
              pj = src / '.claude-plugin' / 'plugin.json'
              if not pj.is_file():
                  print(f"  MISS {p['name']}: {pj} not found"); bad = 1
                  continue
              ver = json.load(open(pj)).get('version')
              if ver != p.get('version'):
                  print(f"  MISS {p['name']}: marketplace {p.get('version')} != plugin.json {ver}"); bad = 1
              else:
                  print(f"  ok {p['name']} ({ver})")
          sys.exit(bad)
          PY

          echo "== per-plugin smoke tests =="
          for t in plugins/*/tests/validate.sh; do
            [ -f "$t" ] || continue
            echo "  -> $t"
            bash "$t"
          done

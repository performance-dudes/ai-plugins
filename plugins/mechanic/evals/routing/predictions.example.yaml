# Captured routing run for the mechanic plugin — the sample CI scores.
#
# HOW THIS WAS PRODUCED: build_router_prompt.py INJECTED THE REAL OBJECT — it read
# the verbatim frontmatter descriptions from the real agents/*.md and the prompts
# from ground_truth.yaml, stripped every answer field, and issued neutral t01… ids
# in a deterministic shuffle (so nothing leaked the route). Three independent BLIND
# router passes over that prompt were UNANIMOUS and matched the locked ground truth
# on every case (accuracy 1.000, macro-F1 1.000, under-routing 0.000, zero variance).
# This file is that unanimous run, translated back to case ids.
#
# THE ONE RULE: if a future run misroutes a case, that is a PLUGIN bug — sharpen the
# errand/mechanic description or the routing rule and re-capture. NEVER edit a locked
# case to make this go green. See ../README.md.

model: mechanic-routing-blind-3run-majority
